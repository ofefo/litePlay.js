<!DOCTYPE html>
<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
	<meta name="Description" content="litePlay">
	<meta charset="utf-8"/>
	<script src="./litePlay.dev.js"></script>
<style>
body {
	font-size: 18px;	
	margin-top: 5%;
	margin-bottom: 5%;
}

div.text{
	text-align: left;
	margin-left: 2.5%;
}
 
.button {
        padding: 10px;
	transition: filter .5s ease;
        border-radius: 5px;
	cursor: pointer;
        margin: .5%;
}

.button:hover {
	filter: brightness(.8);
}

.code {
	width: 95%; 
	height: 500px; 
	font-size: 18px; 
	font-family: monospace; 
	background: #1e1e1e; 
	color: #d4d4d4; 
	padding: 10px;
}

.console {
	width: 95%;
	height: 150px;
	font-size: 16px;
	font-family: monospace;
	background: #000; 
	color: #0f0; 
	padding: 10px; 
	margin-top: 10px;
	border: none; 
	border-radius: 5px; 
	resize: none;
}

.ready-green {
    background-color: #4CAF50;
    color: white;
    font-weight: bold;
    transition: background-color 1s ease;
}
</style>
</head>
<body>
	<div style="display: block; text-align: center; width: 100%;">
		<h1>litePlay</h1>
		<div class="text">
		<br>You can run your code by writting it bellow and than hitting <b>Run</b>.
		<br>Use the <b>Stop</b> button to pause everything.
		<br>New to litePlay? Read the <a href="https://vlazzarini.github.io/litePlay.js/tutorial.html" target="_blank">tutorial</a>.</p>
		</div>
		<textarea class="code" id="code-editor"></textarea>
		<br>
		<textarea id="console-output" readonly class="console"placeholder="Console
			output will appear here."></textarea>
	<div style="display: block; text-align: center; width: 100%;">
		<button class="button" id="run-btn">&#9654; <b>RUN</button>
		<button class="button" id="stop-btn">&#9724; <b>STOP</b></button>
		<button class="button" id="save-btn">&#9660; <b>SAVE</b></button>
	</div>
	</div>
	<script charset="utf-8">
		const consoleOutput = document.getElementById('console-output');
		const originalLog = console.log;
		const originalError = console.error;

		console.log = function(...args) {
			originalLog.apply(console, args);
			
			const message = args.map(arg => {
				return typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg);
			}).join(' ');

			if (consoleOutput) {
				consoleOutput.value += message + '\n';
				consoleOutput.scrollTop = consoleOutput.scrollHeight; 
			}
		};

		console.error = function(...args) {
			originalError.apply(console, args);
			const message = args.map(arg => {
				return typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg);
			}).join(' ');
			
			if (consoleOutput) {
				consoleOutput.value += "ERROR: " + message + '\n';
				consoleOutput.scrollTop = consoleOutput.scrollHeight;
			}
		};

		// Start litePlay
		let liteplayEngine = null;
    
		window.addEventListener('load', async () => {
			try {
				console.log("Loading litePlay engine...");
				
				liteplayEngine = await lpLoad(); 
				
				// Expose all of litePlay.js exports to the global window
				Object.assign(window, liteplayEngine);
				console.log("litePlay engine loaded and ready!");

				// Make the Run button green to show it's ready
				const runBtn = document.getElementById('run-btn');
				if (runBtn) runBtn.classList.add('ready-green');

			} catch (error) {
				console.error("Failed to auto-start litePlay:", error);
			}
		});	
		
		// Inject an execution counter into loops
		function protectCode(code) {
			const maxIterations = 1000; // Max allowed loop cycles per run
			
			// Inject a counter variable at the top
			let safeCode = `let _loopCount = 0;\n` + code;
			
			// Regex to find "while(...){" or "for(...){"
			const loopRegex = /(while\s*\(.*?\)\s*\{|for\s*\(.*?\)\s*\{)/g;
			
			// Inject the counter check right inside the loop's opening bracket
			safeCode = safeCode.replace(loopRegex, `$1
				if (++_loopCount > ${maxIterations}) {
					throw new Error("Infinite loop detected! Execution stopped.");
				}
			`);
			return safeCode;
		}

    		const runLP = async (event) => {
    		    if (event) event.preventDefault(); 
		    try{
    		        // Grab the text from the code editor
    		        const codeEditor = document.getElementById('code-editor');
    		        const lpCode = codeEditor.value;
			if (lpCode == "") throw "Empty!"
			const safeCode = protectCode(lpCode);
    		        // Evaluate the string as actual JavaScript
			eval(safeCode);


    		    } catch (error) {
			await console.error("Failed to execute the code:", error);
    		    }
    		}

    		// --- STOP BUTTON ---
    		const stopLP = async (event) => {
    		    if (event) event.preventDefault();
    		    if (liteplayEngine) {
    		        console.log("Stopping audio...");
    		        // Call stop() directly from the loaded engine module
			await liteplayEngine.stop();
    		        console.log("Audio stopped.");
    		    }
    		}

		// --- SAVE BUTTON ---
		let downloadN = 0;
		const saveCode = () => {
		const text = document.getElementById('code-editor').value;
		
		// Create a virtual file (Blob) containing the code
		const blob = new Blob([text], { type: 'text/javascript' });
		const url = URL.createObjectURL(blob);

		// Create a temporary hidden link and click it to trigger download
		const a = document.createElement('a'); 
		a.href = url;
		a.download = 'litePlay' + String(downloadN) + '.js'; // Default file name
		document.body.appendChild(a);
		a.click();
		document.body.removeChild(a);
		URL.revokeObjectURL(url);
		downloadN++;
		}

    		const runButton = document.querySelector('#run-btn');
    		runButton.addEventListener('click', runLP);
    		
    		const stopButton = document.querySelector('#stop-btn');
    		stopButton.addEventListener('click', stopLP);
    		
		const saveButton = document.querySelector('#save-btn');
    		saveButton.addEventListener('click', saveCode);
</script>
</body>
</html>
