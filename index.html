<!DOCTYPE html>
<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
	<meta name="Description" content="litePlay">
	<meta charset="utf-8"/>
	<script src="./litePlay.dev.js"></script>
<style>
body {
	font-size: 18px;	
	margin-top: 5%;
	margin-bottom: 5%;
}

div.text{
	text-align: left;
	margin-left: 2.5%;
}
 
.button {
        padding: 10px;
        border-radius: 5px;
        margin: .5%;
}

.code {
	width: 95%; 
	height: 500px; 
	font-size: 18px; 
	font-family: monospace; 
	background: #1e1e1e; 
	color: #d4d4d4; 
	padding: 10px;
}
</style>
</head>
<body>
	<div style="display: block; text-align: center; width: 100%;">
		<h1>litePlay</h1>
		<div class="text">
		<p>Before starting, make sure to press the <b>Start</b> button to start the engine.
		<br>You can run your code by writting it bellow and than hitting <b>Run</b>.
		<br>Use the <b>Stop</b> button to pause everything.
		<br>New to litePlay? Read the <a href="https://vlazzarini.github.io/litePlay.js/tutorial.html" target="_blank">tutorial</a>.</p>
		</div>
		<textarea class="code" id="code-editor"></textarea>
	<div style="display: block; text-align: center; width: 100%;">
		<button class="button" id="start-btn">&#9650; <b>START</b></button>
		<button class="button" id="run-btn">&#9654; <b>RUN</button>
		<button class="button" id="stop-btn">&#9724; <b>STOP</b></button>
		<button class="button" id="save-btn">&#9660; <b>SAVE</b></button>
	</div>
	</div>
	<script charset="utf-8">
		// Start litePlay
		let liteplayEngine = null;
    
    		// --- START BUTTON ---
    		const startLP = async (event) => {
    		    if (event) event.preventDefault();
		    // Initialize liteplay only if it hasn't been already
		    try {
		    if (!liteplayEngine) {
    		            console.log("Starting litePlay...");
    		            liteplayEngine = await lpLoad(); 
			    console.log("litePlay is now ready!");

    		            // Expose all of litePlay.js exports (play, stop, grandPiano, etc.) 
    		            // to the global window so the textarea code can find them.
    		            Object.assign(window, liteplayEngine);
			    }
		} catch (error) {
    		        console.error("Failed to start litePlay:", error);
		}
		}
		
		// Inject an execution counter into loops
		function protectCode(code) {
			const maxIterations = 1000; // Max allowed loop cycles per run
			
			// Inject a counter variable at the top
			let safeCode = `let _loopCount = 0;\n` + code;
			
			// Regex to find "while(...){" or "for(...){"
			const loopRegex = /(while\s*\(.*?\)\s*\{|for\s*\(.*?\)\s*\{)/g;
			
			// Inject the counter check right inside the loop's opening bracket
			safeCode = safeCode.replace(loopRegex, `$1
				if (++_loopCount > ${maxIterations}) {
					throw new Error("Infinite loop detected! Execution stopped.");
				}
			`);
			return safeCode;
		}

    		const runLP = async (event) => {
    		    if (event) event.preventDefault(); 
		    try{
    		        // Grab the text from the code editor
    		        const codeEditor = document.getElementById('code-editor');
    		        const lpCode = codeEditor.value;
			if (lpCode == "") throw "Empty!"
			const safeCode = protectCode(lpCode);
    		        // Evaluate the string as actual JavaScript
			eval(safeCode);


    		    } catch (error) {
			await console.error("Failed to execute the code:", error);
			if (error instanceof ReferenceError) console.warn("Have you started litePlay first?");
    		    }
    		}

    		// --- STOP BUTTON ---
    		const stopLP = async (event) => {
    		    if (event) event.preventDefault();
    		    if (liteplayEngine) {
    		        console.log("Stopping audio...");
    		        // Call stop() directly from the loaded engine module
			await liteplayEngine.stop();
    		        console.log("Audio stopped.");
    		    }
    		}

		// --- SAVE BUTTON ---
		const saveCode = () => {
		let downloadN = 0;
		const text = document.getElementById('code-editor').value;
		
		// Create a virtual file (Blob) containing the code
		const blob = new Blob([text], { type: 'text/javascript' });
		const url = URL.createObjectURL(blob);
		// Create a temporary hidden link and click it to trigger download
		const a = document.createElement('a'); 
		a.href = url;
		a.download = 'litePlayCode' + String(downloadN) + '.js'; // Default file name
		document.body.appendChild(a);
		a.click();
			
		
		// Clean up
		document.body.removeChild(a);
		URL.revokeObjectURL(url);
		}

    		const startButton = document.querySelector('#start-btn');
    		startButton.addEventListener('click', startLP);

    		const runButton = document.querySelector('#run-btn');
    		runButton.addEventListener('click', runLP);
    		
    		const stopButton = document.querySelector('#stop-btn');
    		stopButton.addEventListener('click', stopLP);
    		
		const saveButton = document.querySelector('#save-btn');
    		saveButton.addEventListener('click', saveCode);
</script>
</body>
</html>
