<!DOCTYPE html>
<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
	<meta name="Description" content="litePlay">
	<meta charset="utf-8"/>
	<title>litePlay</title>

	<script src="./litePlay.dev.js"></script>

	<!-- add code mirror -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>

	<!-- add hint library (autocomplete on codemirror) -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.css" crossorigin="anonymous">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.js" crossorigin="anonymous"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/javascript-hint.min.js" crossorigin="anonymous"></script>
<style>
body {
	font-size: 18px;	
	margin-top: 5%;
	margin-bottom: 5%;
}

div.text{
	text-align: left;
	margin-left: 2.5%;
}
 
.button {
        padding: 14px;
	transition: filter .5s ease;
        border-radius: 5px;
	cursor: pointer;
        margin: .1%;
	margin-top: .5%;
}

.button:hover {
	filter: brightness(.8);
}

.CodeMirror {
	width: 96%; 
	height: 500px; 
	font-size: 18px; 
	font-family: monospace; 
	text-align: left;
	margin: 0 auto;
	border-radius: 5px;
}

.console {
	width: 95%;
	height: 150px;
	font-size: 16px;
	font-family: monospace;
	background: #2e2e2e; 
	color: #0f0; 
	padding: 10px; 
	margin-top: 10px;
	border: none; 
	border-radius: 5px; 
	resize: none;
}

.ready-green {
    background-color: #4CAF50;
    color: white;
    font-weight: bold;
    transition: background-color 1s ease;
}

.ready-red {
    background-color: #A84732;
    color: white;
    font-weight: bold;
    transition: background-color 1s ease;
}

</style>
</head>
<body>
	<div style="display: block; text-align: center; width: 100%;">
		<h1>litePlay</h1>
		<div class="text">
			<p>
			<br>Welcome to litePlay!
			<br>Write your code bellow and hit <b>Run</b> or type <b>Ctrl+Enter</b>.
			<br>Use the <b>Stop</b> button to pause everything.
			<br>New to litePlay? Read the <b><a href="https://vlazzarini.github.io/litePlay.js/tutorial.html" target="_blank">tutorial</a></b>.</p>
		</div>
		<textarea class="code" id="code-editor"></textarea>
		<br>
		<textarea id="console-output" autocomplete="off" readonly class="console" placeholder="Click anywhere to start litePlay."></textarea>
		<div style="display: block; text-align: center; width: 100%;">
			<div style="margin-right: 1%; display: inline;">
				<button class="button" id="run-btn">&#9654; <b>RUN</b></button>
				<button class="button" id="stop-btn">&#9724; <b>STOP</b></button>
				<button class="button" id="save-btn">&#9660; <b>SAVE CODE</b></button>
			</div>
			<div style="display: inline;">
				<button class="button" id="rec-btn">&#9673; <b>REC</b></button>
				<button class="button" id="stopRec-btn">&#9689; <b>STOP REC</b></button>
			</div>
		</div>
		</div>
	<script charset="utf-8">
		// send console output to textarea
		const consoleOutput = document.getElementById('console-output');
		const originalLog = console.log;
		const originalError = console.error;
		
		console.log = function(...args) {
			originalLog.apply(console, args); // make them variables
			
			const message = args.map(arg => {
				if (typeof arg === 'object') return JSON.stringify(arg, null, 2);
				return String(arg);
			}).join(' ');

			if (consoleOutput) {
				consoleOutput.value += message + '\n';
				consoleOutput.scrollTop = consoleOutput.scrollHeight;
			}
		};
		
		console.error = function(...args) {
			originalError.apply(console, args);
			
			const message = args.map(arg => {
				if (arg instanceof Error) return arg.message || arg.toString();
				if (typeof arg === 'object') return JSON.stringify(arg, null, 2);
				return String(arg);
			}).join(' ');
			
			if (consoleOutput) {
				consoleOutput.value += "ERROR: " + message + '\n';
				consoleOutput.scrollTop = consoleOutput.scrollHeight;
			}
		};

		//replace textarea for CodeMirror 
		const editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
			mode: "javascript",
			theme: "monokai",
			lineNumbers: true,
			indentUnit: 4,
			tabSize: 4,
			extraKeys: { 
				"Ctrl-Enter": function(cm) {runLP();}, //run with ctrl+enter
				"Cmd-Enter": function(cm) {runLP();}
			}
		});

		//auto-trigger for the autocomplete
		editor.on("keyup", function (cm, event) {
			if (!cm.state.completionActive && event.keyCode >= 65 && event.keyCode <= 90) {
				cm.showHint({ completeSingle: false }); //prevent automatic insertion when there's only one option left
			}
		});


		//start litePlay
		let liteplayEngine = null;
    
		document.addEventListener('pointerdown', async () => {

		if (!liteplayEngine) {
			try {
				console.log("Loading litePlay engine...");
				liteplayEngine = await lpLoad(); 

				// Expose all of litePlay.js exports to the global window
				Object.assign(window, liteplayEngine);
				console.log("litePlay is ready!");

				// Make the Run button green to show it's ready
				const runBtn = document.getElementById('run-btn');
				if (runBtn) runBtn.classList.add('ready-green');

				const recBtn = document.getElementById('rec-btn');
				if (recBtn) recBtn.classList.add('ready-red');

			} catch (error) {
				console.error("Failed to auto-start litePlay:", error);
			}
		}
		}, {once: true});
		
		//prevent code to running loops for more than N cycles
		function protectCode(code) {
			const maxIterations = 1000; //max allowed loop cycles per run
			
			let safeCode = `let _loopCount = 0;\n` + code;
			
			const loopRegex = /(while\s*\(.*?\)\s*\{|for\s*\(.*?\)\s*\{)/g; //regex to find while and for loops brackets
			
			safeCode = safeCode.replace(loopRegex, `$1 if
			(++_loopCount > ${maxIterations}) {throw new
			Error("Infinite loop detected! Execution stopped.");
			}`);
			return safeCode;
		}

		const activeTimeouts = [];
		const originalSetTimeout = window.setTimeout;
		
		//override setTimeout to remember its ID
		window.setTimeout = function(func, delay, ...args) {
		    const id = originalSetTimeout(func, delay, ...args);
		    activeTimeouts.push(id);
		    return id;
		};
		
		//run button
		const runLP = async (event) => {
		if (event) event.preventDefault();
			try {
    		        const lpCode = editor.getValue();
			
			if (lpCode == "") throw "Empty! Write something!"
			const safeCode = protectCode(lpCode);
			eval(safeCode);

    		} catch (error) {
		    	await console.error(error);
    		}
    		}

    		//stop button 
    		const stopLP = async (event) => {
    		    if (event) event.preventDefault();

		    activeTimeouts.forEach(id => clearTimeout(id)); //clear all timeOuts
		    activeTimeouts.length = 0;
		
    		    if (liteplayEngine) {
    		        console.log("Stopping audio...");
			await reset();
    		        console.log("Audio stopped.");
    		    }
    		}

		//save button
		const saveCode = () => {

		const now = new Date();
		const datetime = `${now.getFullYear()}_${now.getMonth()+1}_${now.getDate()}_${now.getHours()}_${now.getMinutes()}`;

		const text = editor.getValue();
		const blob = new Blob([text], { type: 'text/javascript' });
		const url = URL.createObjectURL(blob);
		const a = document.createElement('a'); 
		a.href = url;
		a.download = 'litePlay' + datetime + '.js';
		document.body.appendChild(a);
		a.click();
		document.body.removeChild(a);
		URL.revokeObjectURL(url);
		}

		// recording feature
		let mediaRecorder = null;
		let audioChunks = [];
		let destNode = null;
		let connectedCsoundNode = null;
		
		async function startRecording() {
		    if (!audio_context || !csound || mediaRecorder?.state === "recording") {
		        console.error("Engine not ready or already recording.");
		        return;
		    }
		
		    try {
		        destNode = audio_context.createMediaStreamDestination();
		        connectedCsoundNode = await csound.getNode();
		        connectedCsoundNode.connect(destNode);
		        mediaRecorder = new MediaRecorder(destNode.stream);
		        audioChunks = [];
		
		        mediaRecorder.ondataavailable = (event) => {
		            if (event.data.size > 0) {
		                audioChunks.push(event.data);
		            }
		        };
		
		        mediaRecorder.onstop = () => {
		            const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
		            const audioUrl = URL.createObjectURL(audioBlob);
		            
		            const now = new Date();
		            const datetime = `${now.getFullYear()}_${now.getMonth()+1}_${now.getDate()}_${now.getHours()}_${now.getMinutes()}`;
		            
		            const link = document.createElement('a');
		            link.href = audioUrl;
		            link.download = 'litePlay_' + datetime + '.wav';
		            document.body.appendChild(link);
		            link.click();
		            link.remove(); 
		            
		            if (connectedCsoundNode) {
		                connectedCsoundNode.disconnect(destNode);
		                connectedCsoundNode = null;
		            }
		        };
		
		        mediaRecorder.start();
		        console.log("Recording started...");
		
		    } catch (err) {
		        console.error("Failed to start recording: ", err);
		    }
		}
		
		function stopRecording() {
		    if (mediaRecorder && mediaRecorder.state === "recording") {
		        mediaRecorder.stop();
		        console.log("Recording stopped! Downloading file...");
		    }
		}
		
		const runButton = document.querySelector('#run-btn');
		runButton.addEventListener('click', runLP);
		
		const stopButton = document.querySelector('#stop-btn');
		stopButton.addEventListener('click', stopLP);
		
		const saveButton = document.querySelector('#save-btn');
		saveButton.addEventListener('click', saveCode);

		const recButton = document.querySelector('#rec-btn');
		recButton.addEventListener('click', startRecording);

		const stopRecButton = document.querySelector('#stopRec-btn');
		stopRecButton.addEventListener('click', stopRecording);

</script>
</body>
</html>
